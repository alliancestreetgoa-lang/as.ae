name = "alliance-chat"
main = "worker.js"
compatibility_date = "2026-01-01"

# API keys are NOT stored here — they're secrets set with:
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put RESEND_API_KEY

# Caps requests per visitor IP before they reach the (paid) OpenAI call.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 20
  period = 60
